name: Auto Release

# Trigger after CI completes on main so the release only tags green builds.
# A second job (goreleaser) runs GoReleaser directly in this workflow because
# GitHub does not fire workflow triggers for tag pushes made by GITHUB_TOKEN.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  auto-release:
    name: Compute and tag release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      bump: ${{ steps.bump.outputs.bump }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Inspect commits since the last tag and determine the highest-priority bump.
      #
      # Rules (from highest to lowest priority):
      #   (feat|fix|refactor|perf|ci)!: → minor  (no major; breaking changes are minor bumps)
      #   (feat|fix|refactor|perf|ci):  → patch
      #
      # Any commit type not listed (docs:, chore:, test:, …) is ignored.
      # If no releasable commits exist since the last tag, BUMP=none and no tag
      # is created.
      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          BUMP="none"
          while IFS= read -r msg; do
            # breaking change (!) → minor (highest priority; short-circuit on first match)
            if echo "$msg" | grep -qE '^(feat|fix|refactor|perf|ci)(\([^)]*\))?!:'; then
              BUMP="minor"
              break
            fi
            # non-breaking releasable type → patch
            if echo "$msg" | grep -qE '^(feat|fix|refactor|perf|ci)(\([^)]*\))?:'; then
              if [ "$BUMP" = "none" ]; then BUMP="patch"; fi
            fi
          done < <(git log "$RANGE" --pretty=tformat:"%s")

          echo "bump=$BUMP"         >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Bump level: $BUMP (since ${LAST_TAG:-'beginning'})"

      - name: Compute next version
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          BUMP="${{ steps.bump.outputs.bump }}"

          if [ -z "$LAST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi

          case "$BUMP" in
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Tag release
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Tagged ${{ steps.version.outputs.version }}"

  # GoReleaser must run here rather than in release.yml because GitHub will not
  # fire workflow triggers for tag pushes made by GITHUB_TOKEN (infinite-loop
  # guard). release.yml still handles tags pushed by a human (make release-*).
  goreleaser:
    name: Build and publish release
    needs: auto-release
    if: needs.auto-release.outputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create the GitHub release and upload artifacts
      id-token: write      # mint the OIDC token the attestation is signed with
      attestations: write  # record the provenance attestation

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.auto-release.outputs.version }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: dist/checksums.txt
