name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -coverpkg=./... ./... -coverprofile=coverage.out -count=1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not determine test coverage"
            exit 1
          fi
          if awk -v cov="$COVERAGE" 'BEGIN { exit !(cov < 85) }'; then
            echo "::error::Coverage ${COVERAGE}% is below the required 85% threshold"
            exit 1
          fi
          echo "Coverage check passed: ${COVERAGE}% >= 85%"
