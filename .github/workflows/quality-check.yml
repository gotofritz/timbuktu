name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          # Build golangci-lint from source with the job's Go toolchain
          # (go 1.26, from go.mod). The prebuilt binaries are compiled with an
          # older Go and refuse to target a newer module: "the Go language
          # version used to build golangci-lint is lower than the targeted
          # version". goinstall compiles it with 1.26 so it can lint 1.26 code.
          install-mode: goinstall

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -coverpkg=./... ./internal/... -coverprofile=coverage.out -count=1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not determine test coverage"
            exit 1
          fi
          if awk -v cov="$COVERAGE" 'BEGIN { exit !(cov < 85) }'; then
            echo "::error::Coverage ${COVERAGE}% is below the required 85% threshold"
            exit 1
          fi
          echo "Coverage check passed: ${COVERAGE}% >= 85%"
