name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          # Build golangci-lint from source with the job's Go toolchain
          # (go 1.26, from go.mod). The prebuilt binaries are compiled with an
          # older Go and refuse to target a newer module: "the Go language
          # version used to build golangci-lint is lower than the targeted
          # version". goinstall compiles it with 1.26 so it can lint 1.26 code.
          install-mode: goinstall

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Same gate as `make check-ci` — the shared script enforces >= 85% total
      # AND per package, so a PR can't drop one package's coverage while the
      # total stays green. Local and CI gates stay in lockstep by construction.
      - name: Check coverage threshold (total + per-package)
        run: ./scripts/check-coverage.sh
