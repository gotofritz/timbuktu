name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Gate: a tag push does not trigger the CI workflow, so re-run the checks
  # here. GoReleaser only runs if vet and the full test suite pass, so a broken
  # commit can never ship a published binary.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create the GitHub release and upload artifacts
      id-token: write      # mint the OIDC token the attestation is signed with
      attestations: write  # record the provenance attestation
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          # Pin to the v2 line so a GoReleaser major bump can't break the v2
          # config, or ship from a compromised upstream release, at publish time.
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sign a build-provenance attestation for every published artifact. The
      # binaries and checksums.txt otherwise ship together with nothing binding
      # them to this workflow run, so tampering with both goes undetected.
      # Feeding the checksums file attests each archive it lists in one shot;
      # consumers verify with `gh attestation verify <file> --repo <owner>/<repo>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: dist/checksums.txt
