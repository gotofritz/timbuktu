version: 2

project_name: tbuk

before:
  hooks:
    - go mod tidy

builds:
  - id: tbuk
    main: ./cmd/tbuk
    binary: tbuk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/gotofritz/timbuktu/internal/cli.version={{.Version}}

archives:
  - id: tbuk
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  prerelease: auto
